<body>
    <div class="header">
        <nav>
            <a href="#"><img src="nike-text.png"></a>

        </nav>
    </div>
    <div class="container">
        <div class="contact">
            <div class="wrapper">
                <div class="form">
                    <h3  class="titre">Me contacter!</h3>
                    <form>
                        <div class="group">
                            <input type="text" name="prenom" placeholder="Ton prénom">
                        </div>
                        <div class="group">
                            <input type="email" name="email" placeholder="Ton email">
                        </div>
                        <div class="group">
                            <input type="textarea" name="message" placeholder="Ton message">
                        </div class=button>
                        <button type="envoyer">Envoyer le message!</button>
                    </form>
                </div>
                <div class="info">
                    <div class="message">
                        <h3>Message me</h3>
                        <button>Mon Mail</button>
                    </div>
                    <div class="phone">
                        <h3>Numéro de téléphone</h3>
                        <button>Mon Numéro</button>
                    </div>
                    <div class="a-propos-de-moi">
                        <a href="apropos.html"><h3>A propos de moi</h3></a>
                        <button>En savoir plus</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
